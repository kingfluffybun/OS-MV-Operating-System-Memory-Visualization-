<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <title>OS-MV | Admin-Dashboard</title>
    <script src="../script.js" defer></script>
    <script src="../simulator/util/script.js" defer></script>
    <script src="../database/db.js" defer></script>
</head>
<body onload="initAdminDashboard()">
    <!-- Loader -->
    <div id="loader-wrapper">   
        <div class="loader-content">
            <div class="logo-shimmer-container">
                <img src="/LOGO/LOGO_4.jpg" class="loader-logo" alt="Logo">
                <div class="logo-glow"></div>
            </div>
            <h1 class="loader-text">OS-MV</h1>
        </div>
        <div class="loader-panel left"></div>
        <div class="loader-panel right"></div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <section class="main">
        <div class="main-container">
            <div class="admin-header">
                <h2>User Accounts Overview</h2>
                <p class="subtitle">List of all registered users in the system.</p>
            </div>
            
            <!-- table -->
            <div class="table-wrapper">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>USERNAME</th>
                            <th>STATUS</th>
                            <th>CREATED DATE</th>
                            <th>LAST SESSION</th>
                            <th style="text-align: center;">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </div>
    </section>

<script>
    async function initAdminDashboard() {
        checkAdminAccess();
        await loadUsers();
    }

    window.addEventListener("load", function() {
        const loaderWrapper = document.getElementById("loader-wrapper");
        
        setTimeout(() => {
            loaderWrapper.classList.add("loaded");
            
            setTimeout(() => {
                loaderWrapper.style.display = "none";
            }, 600);
        }, 1500); 
    });

</script>

</body>
</html>
