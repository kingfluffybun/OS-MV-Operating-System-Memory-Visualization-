<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <title>OS-MV | User Management</title>
</head>
<body>
    <section class="sidebar" id="sidebar">
        <div class="logo">
            <h1>OS-MV</h1>
            <p>Operating System <br> Management Visualizer</p>
        </div>

        <div class="sidebar-options">
                    <div class="active">
                        <a href="#usermanagement">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                            <p>User Management</p>
                        </a>
                    </div>

                        <div class="bottom-options"> 
                        <a href="../simulator/index.html">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
                        <p>Go back to simulator</p>
                    </a>
                </div>
                <div>
                    <a href="../index.html">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
                        <p>Logout</p>
                </a>
            </div>
        </div>
    </section>

        <section class="main">
                <div class="main-container">
                    <div class="admin-header">
                        <h2>User Accounts Overview</h2>
                        <p class="subtitle">List of all registered users in the system.</p>
                    </div>
                    
                    <div class="table-wrapper">
                        <table class="user-table">
                            <thead>
                        <tr>
                            <th>USERNAME</th>
                            <th>CREATED DATE</th>
                            <th>LAST SESSION</th>
                            <th style="text-align: center;">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                                <td class="username-cell">akoto</td>
                                <td>April 4, 2026</td>
                                <td><span class="badge online">Active Now</span></td>
                                <td>
                                    <div class="action-cell">
                                            <button class="ui-btn reset">Reset Password</button>
                                            <button class="ui-btn delete">Delete Account</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="username-cell">nyak</td>
                                <td>April 5, 2026</td>
                                    <td><span class="badge offline">2 hours ago</span></td>
                                    <td>
                                    <div class="action-cell">
                                        <button class="ui-btn reset">Reset Password</button>
                                        <button class="ui-btn delete">Delete Account</button>
                                    </div>
                                    </td>
                            </tr>
                            <tr>
                                <td class="username-cell">haha</td>
                                        <td>April 5, 2026</td>
                                        <td><span class="badge online">Active Now</span></td>
                                        <td>
                                            <div class="action-cell">
                                            <button class="ui-btn reset">Reset Password</button>
                                            <button class="ui-btn delete">Delete Account</button>
                                        </div>
                                    </td>
                                </tr>
                                    </td>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
