<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/output.css">
    <title>Document</title>
    <script src="../util/script.js" defer></script>
</head>
<body>
    <section class="sidebar" id="sidebar">
        <div class="logo" id="logo">
            <h1 id="h1">OS-MV</h1>
            <p>Operating System <br> Management Visualizer</p>
        </div>
        <div class="sidebar-options">
            <div class="active">
                <a href="#dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard-icon lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <p>Dashboard</p>
                </a>
            </div>
            <div>
                <button onclick="toggleSubMenu(this)" class="dropdown-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chart-bar-big-icon lucide-chart-bar-big"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><rect x="7" y="13" width="9" height="4" rx="1"/><rect x="7" y="5" width="12" height="4" rx="1"/></svg>
                    <p>Simulation</p>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down-icon lucide-chevron-down"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div class="sub-menu">
                    <div>
                        <a href="#single-mode"><p>Single Mode</p></a>
                        <a href="#comparison-mode"><p>Comparison Mode</p></a>
                    </div>
                </div>
            </div>
            <div>
                <a href="#single-mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zap-icon lucide-zap"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
                    <p>Single Mode</p>
                </a>
            </div>
            <div>
                <a href="#comparison-mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-comparison-icon lucide-comparison"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <p>Comparison Mode</p>
                </a>
            </div>
            <div style="display: flex; align-items: center;">
                <a href="#profile">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-user-icon lucide-circle-user"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>
                    <div style="display: flex; flex-direction: column; gap: 4px; padding: 0;">
                        <p>Fluffybun</p>
                        <p style="font-size: 12px; font-weight: 300;">Clarence.luna651@gmail.com</p>
                    </div>
                </a>
            </div>
            <div>
                <a href="#logout">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-log-out-icon lucide-log-out"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
                    <p>Logout</p>
                </a>
            </div>
        </div>
    </section>
    <section class="main">
        <button id="toggle-btn" onclick="toggleSideBar()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevrons-left-icon lucide-chevrons-left"><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>
        </button>
        <div class="input-values">
            <form action="">
                <div class="input-block">
                    <input type="number" name="block" id="block 1" placeholder="Block 1">
                    <input type="number" name="block" id="block 2" placeholder="Block 2">
                    <input type="number" name="block" id="block 3" placeholder="Block 3">
                    <input type="number" name="block" id="block 4" placeholder="Block 4">
                    <button type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        Add New Block
                    </button>
                </div>
                
                <div class="input-process">
                    <input type="number" name="process" id="block 1" placeholder="Process 1">
                    <input type="number" name="process" id="block 2" placeholder="Process 2">
                    <input type="number" name="process" id="block 3" placeholder="Process 3">
                    <input type="number" name="process" id="block 4" placeholder="Process 4">
                    <button type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        Add New Process
                    </button>
                </div>

                <div class="input-action">
                    <button type="button" style="display: flex; align-items: center; justify-content: center; gap: 8px">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-dices-icon lucide-dices"><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/></svg>
                        Random Values
                    </button>
                    <button type="submit">
                        <a href="test.html">Start Simulation</a>
                    </button>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
