<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/output.css">
    <link rel="stylesheet" href="../../css/test.css">
    <title>OS-MV | Compare Simulation</title>
    <script src="../../util/script.js" defer></script>
    <script src="../../util/comparison.js" defer></script>
    <script src="../../../database/db.js" defer></script>
</head>
<body onload="compareSimulationLoad()">

    <div id="sidebar-container"></div>

    <section class="main compare-main">
        <button id="toggle-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>
        </button>

        <!-- Global Controls -->
        <div class="compare-global-controls">
            <div class="control-group">
                <button id="play-all-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>
                    <span>Play All</span>
                </button>
                <button id="stop-all-btn" style="display: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="14" y="3" width="5" height="18" rx="1"/><rect x="5" y="3" width="5" height="18" rx="1"/></svg>
                    <span>Stop All</span>
                </button>
            </div>
            <div class="control-group">
                <button id="reset-all-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    <span>Reset All</span>
                </button>
            </div>
            <div class="control-group">
                <button id="next-all-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.029 4.285A2 2 0 0 0 7 6v12a2 2 0 0 0 3.029 1.715l9.997-5.998a2 2 0 0 0 .003-3.432z"/><path d="M3 4v16"/></svg>
                    <span>Next Step</span>
                </button>
            </div>
            <div class="control-group speed-control">
                <span>Speed:</span>
                <input type="range" min="0.5" max="3" step="0.5" value="1" id="slider">
                <span class="speed-display">1x</span>
            </div>
        </div>

        <!-- Algorithm Instances Grid -->
        <div id="compare-instances" class="compare-instances-grid">
            <!-- Dynamically populated by comparison.js -->
        </div>
    </section>

</body>
</html>
