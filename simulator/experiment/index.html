<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/output.css">
    <title>OS-MV</title>
    <script src="../experiment/js/script.js" defer></script>
    <script src="../../database/db.js" defer></script>
</head>
<body onload="hub()">
    <section class="sidebar" id="sidebar">
        <div class="logo" id="logo">
            <h1 id="h1">OS-MV</h1>
            <p>Operating System <br> Management Visualizer</p>
        </div>
        <div class="sidebar-options">
            <div class="active">
                <a href="#dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard-icon lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <p>Dashboard</p>
                </a>
            </div>
            <div>
                <button onclick="toggleSubMenu(this)" class="dropdown-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chart-bar-big-icon lucide-chart-bar-big"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><rect x="7" y="13" width="9" height="4" rx="1"/><rect x="7" y="5" width="12" height="4" rx="1"/></svg>
                    <p>Simulation</p>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down-icon lucide-chevron-down"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div class="sub-menu">
                    <div>
                        <a href="#single-mode">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zap-icon lucide-zap"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
                            <p>Single Mode</p>
                        </a>
                        <a href="#comparison-mode">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-comparison-icon lucide-comparison"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                            <p>Comparison Mode</p>
                        </a>
                    </div>
                </div>
            </div>
            <div style="display: flex; align-items: center;">
                <a href="#profile">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-user-icon lucide-circle-user"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>
                    <div style="display: flex; flex-direction: column; gap: 4px; padding: 0;">
                        <p id="username"></p>
                    </div>
                </a>
            </div>
            <div>
                <a href="../index.html" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-log-out-icon lucide-log-out"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
                    <p>Logout</p>
                </a>
            </div>
        </div>
    </section>
    <section class="main">
        <button id="toggle-btn" onclick="toggleSideBar()">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevrons-left-icon lucide-chevrons-left"><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>
        </button>
        <div class="main-container">
            <h2>Select Memory Allocation Algorithm</h2> <br>
            <form id="simulation-Option" onsubmit="startSimulation(event)">
                <div class="contiguous">
                    <div class="header">
                        <div style="display: flex; gap: 8px; flex-direction: column;">
                            <h3>Contiguous</h3>
                            <p>Stores data in one single, unbroken block.</p>
                        </div>
                        <!-- toggle fixed/dynamic -->
                        <div class="toggle-partition">
                            <label class="toggle">
                                <input type="checkbox" class="checkbox" value="isDynamic">
                                <div class="wrapper">
                                    <div class="text">
                                        <span class="fixed">Fixed</span>
                                        <span class="dynamic">Dynamic</span>
                                    </div>
                                    <span class="pill"></span>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="contiguous-option">
                        <!-- First fit -->
                        <label> 
                            <input type="radio" name="algo" class="algo-option" value="first-fit">
                            <div class="algo-content">
                                <div class="algo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg></div>
                                <h3>First Fit</h3>
                                <p>Allocates the first hole encountered that is large enough.</p>
                            </div>
                        </label>
                        <!-- Next fit -->
                        <label>
                            <input type="radio" name="algo" class="algo-option" value="next-fit">
                            <div class="algo-content">
                                <div class="algo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-play-icon lucide-play"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg></div>
                                <h3>Next Fit</h3>
                                <p>Allocates the first hole found starting from the last search.</p>
                            </div>
                        </label>
                        <!-- Best fit -->
                        <label>
                            <input type="radio" name="algo" class="algo-option" value="Best-Fit">
                            <div class="algo-content">
                                <div class="algo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-puzzle-icon lucide-puzzle"><path d="M15.39 4.39a1 1 0 0 0 1.68-.474 2.5 2.5 0 1 1 3.014 3.015 1 1 0 0 0-.474 1.68l1.683 1.682a2.414 2.414 0 0 1 0 3.414L19.61 15.39a1 1 0 0 1-1.68-.474 2.5 2.5 0 1 0-3.014 3.015 1 1 0 0 1 .474 1.68l-1.683 1.682a2.414 2.414 0 0 1-3.414 0L8.61 19.61a1 1 0 0 0-1.68.474 2.5 2.5 0 1 1-3.014-3.015 1 1 0 0 0 .474-1.68l-1.683-1.682a2.414 2.414 0 0 1 0-3.414L4.39 8.61a1 1 0 0 1 1.68.474 2.5 2.5 0 1 0 3.014-3.015 1 1 0 0 1-.474-1.68l1.683-1.682a2.414 2.414 0 0 1 3.414 0z"/></svg></div>
                                <h3>Best Fit</h3>
                                <p>Allocates the smallest hole that can satisfy the request.</p>
                            </div>
                        </label>
                        <!-- Worst fit -->
                        <label>
                            <input type="radio" name="algo" class="algo-option" value="Worst-Fit">
                            <div class="algo-content">
                                <div class="algo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-maximize2-icon lucide-maximize-2"><path d="M15 3h6v6"/><path d="m21 3-7 7"/><path d="m3 21 7-7"/><path d="M9 21H3v-6"/></svg></div>
                                <h3>Worst Fit</h3>
                                <p>Allocates the largest hole available in the entire list.</p>
                            </div>
                        </label>
                    </div>
                </div>
                <div class="non-contiguous">
                    <div class="header">
                        <div style="display: flex; gap: 8px; flex-direction: column;">
                            <h3>Non-Contiguous</h3>
                            <p>Breaks data into pieces and fits them into any available memory gaps.</p>
                        </div>
                    </div>
                    <div class="non-contiguous-option">
                        <!-- Paging -->
                        <label>
                            <input type="radio" name="algo" class="algo-option" value="Paging">
                            <div class="algo-content">
                                <div class="algo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-grid3x3-icon lucide-grid-3x3"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg></div>
                                <h3>Paging</h3>
                                <p>Divides memory into fixed-size blocks called pages.</p>
                            </div>
                        </label>
                        <!-- Segmentation -->
                        <label>
                            <input type="radio" name="algo" class="algo-option" value="Segmentation">
                            <div class="algo-content">
                                <div class="algo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-columns3-icon lucide-columns-3"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="M15 3v18"/></svg></div>
                                <h3>Segmentation</h3>
                                <p>Divides memory into variable-size blocks based on logic.</p>
                            </div>
                        </label>
                        <!-- Segmentation with Paging -->
                        <label>
                            <input type="radio" name="algo" class="algo-option" value="Seg-Paging">
                            <div class="algo-content">
                                <div class="algo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layers2-icon lucide-layers-2"><path d="M13 13.74a2 2 0 0 1-2 0L2.5 8.87a1 1 0 0 1 0-1.74L11 2.26a2 2 0 0 1 2 0l8.5 4.87a1 1 0 0 1 0 1.74z"/><path d="m20 14.285 1.5.845a1 1 0 0 1 0 1.74L13 21.74a2 2 0 0 1-2 0l-8.5-4.87a1 1 0 0 1 0-1.74l1.5-.845"/></svg></div>
                                <h3>Segmentation with Paging</h3>
                                <p>Divides logical segments into fixed-size pages.</p>
                            </div>
                        </label>
                    </div>
                </div>
                <button type="submit">Start Simulation</button>
            </form>
        </div>

    </section>
</body>
</html>
